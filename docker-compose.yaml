services:
  web:
    build: .

    volumes:
      - .:/django

    ports:
      - "8000:8000"

    container_name: django_container

    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  
  db:
    image: postgres:16-alpine
    # alpine = minimal Linux variant, much smaller image than full postgres

    container_name: postgres_container

    restart: unless-stopped

    # These environment variables are read by the official postgres image
    # on first startup to create the database, user, and password
    # They match what you will put in your .env file for Django to connect
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: